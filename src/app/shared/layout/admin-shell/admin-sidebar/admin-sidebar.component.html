<aside class="sidebar-aside">

  <div class="sidebar-logo">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <circle cx="9" cy="13.5" r="1.8" fill="#8b5cf6"/>
      <path d="M5.4 10.2 A5.2 5.2 0 0 1 12.6 10.2"
            stroke="#8b5cf6" stroke-width="1.4" stroke-linecap="round" opacity="0.65"/>
      <path d="M2.4 7 A8.4 8.4 0 0 1 15.6 7"
            stroke="#8b5cf6" stroke-width="1.4" stroke-linecap="round" opacity="0.28"/>
    </svg>
    <div>
      <span class="sidebar-logo-name logo-name-block">AI Asystent</span>
      <span class="admin-badge">Admin</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <ul>
      @for (item of navItems; track item.route) {
        <li>
          <a [routerLink]="item.route" routerLinkActive="is-active" class="nav-link">
            <i [class]="'pi ' + item.icon" class="nav-icon"></i>
            <span>{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <div class="sidebar-user">
    <div class="sidebar-user-trigger" (click)="menu.toggle($event)">
      <div class="sidebar-user-avatar admin-avatar">{{ initials }}</div>
      <span class="sidebar-user-email">{{ supabase.userEmail }}</span>
      <i class="pi pi-ellipsis-h sidebar-ellipsis"></i>
    </div>
    <p-menu #menu [model]="menuItems" [popup]="true" />
  </div>

</aside>
